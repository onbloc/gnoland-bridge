    <title>Gno.land Bridge</title>
    <script>
      (function () {
        try {
          var t = localStorage.getItem('gnobridge.theme')
          if (t !== 'light' && t !== 'dark') t = 'light'
          document.documentElement.dataset.theme = t
        } catch (e) {
          document.documentElement.dataset.theme = 'light'
        }
      })()
    </script>
